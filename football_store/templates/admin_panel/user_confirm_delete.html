<div class="d-flex justify-content-center align-items-center" style="min-height:60vh;">
  <div class="card shadow-lg border-0 p-4" style="width: 100%; max-width: 400px;">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h4 class="mb-0 text-danger">Delete User</h4>
      <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
    </div>
    <form method="post" autocomplete="off">
      {% csrf_token %}
      <div class="mb-3 text-center">
        <p>Are you sure you want to delete user <strong>{{ user_obj.username }}</strong>?</p>
      </div>
      <div class="d-flex gap-2 mt-4">
        <button type="button" class="btn btn-light flex-fill" data-bs-dismiss="modal">Cancel</button>
        <button type="submit" class="btn btn-danger flex-fill">Yes, Delete</button>
      </div>
    </form>
  </div>
</div>
