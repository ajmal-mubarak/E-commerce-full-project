{% extends 'admin_panel/base_admin.html' %}
{% block content %}
<h3>Confirm Delete</h3>
<p>Delete user: <strong>{{ user_obj.username }}</strong> ?</p>
<form method="post">{% csrf_token %}
  <button class="btn btn-danger">Yes, delete</button>
  <a class="btn btn-secondary" href="{% url 'admin_panel:users_list' %}">Cancel</a>
</form>
{% endblock %}
