{% extends "base.html" %}
{% load static %}
{% block content %}

<div class="container py-5 mt-5 pt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">

      <div class="card shadow-lg border-0">
        <div class="card-body p-4">

          <!-- Header -->
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h4 class="fw-bold mb-0">Secure Payment</h4>
            <span class="badge bg-success">SSL Secured</span>
          </div>

          <p class="text-muted mb-1">Order ID: <strong>#{{ order.id }}</strong></p>
          <h5 class="fw-bold text-primary mb-3">
            Amount Payable: ₹{{ order.total_amount }}
          </h5>

          <hr>

          <!-- Payment Methods -->
          <h6 class="fw-bold mb-3">Choose Payment Method</h6>

          <div class="list-group mb-4">

<label class="list-group-item d-flex align-items-center">
  <input class="form-check-input me-3"
         type="radio"
         name="gateway"
         value="gpay"
         checked>
  <img src="{% static 'images/gpay.png' %}" height="28" class="me-2">
  Google Pay
</label>

<label class="list-group-item d-flex align-items-center">
  <input class="form-check-input me-3"
         type="radio"
         name="gateway"
         value="phonepe">
  <img src="{% static 'images/phonepe.png' %}" height="28" class="me-2">
  PhonePe
</label>

<label class="list-group-item d-flex align-items-center">
  <input class="form-check-input me-3"
         type="radio"
         name="gateway"
         value="paytm">
  <img src="{% static 'images/paytm.png' %}" height="28" class="me-2">
  Paytm
</label>

<label class="list-group-item d-flex align-items-center">
  <input class="form-check-input me-3"
         type="radio"
         name="gateway"
         value="card">
  💳 Debit / Credit Card
</label>


          </div>

          <!-- Actions -->
          <form method="post">
            {% csrf_token %}

            <button name="action" value="success"
              class="btn btn-success w-100 mb-2 py-2" disabled>
              Pay ₹{{ order.total_amount }}(Coming Soon)
            </button>
            

            <button name="action" value="fail"
              class="btn btn-outline-danger w-100" disabled>
              Cancel Payment
            </button>
          </form>

          <p class="text-center text-muted mt-3" style="font-size: 13px;">
            This is a simulated payment gateway for demo purposes only.
          </p>

        </div>
      </div>

    </div>
  </div>
</div>

{% endblock %}
