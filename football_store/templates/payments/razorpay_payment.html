{% extends "base.html" %}

{% block content %}
<div class="container py-5 mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <div class="card p-5 shadow-sm">
                <h3 class="fw-bold mb-4">Complete Your Payment</h3>
                <p class="text-muted mb-4">You are about to pay <strong>₹{{ amount }}</strong> for your order <strong>#{{ order.id }}</strong>.</p>
                
                <button id="rzp-button1" class="btn btn-primary btn-lg w-100">Pay Now</button>
            </div>
        </div>
    </div>
</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script>
var options = {
    "key": "{{ razorpay_key_id }}",
    "amount": "{{ amount_in_paise }}",
    "currency": "INR",
    "name": "Football Store",
    "description": "Payment for Order #{{ order.id }}",
    "order_id": "{{ razorpay_order_id }}",
    "callback_url": "{{ request.scheme }}://{{ request.get_host }}{% url 'razorpay_callback' order.id %}",
    "redirect": true,
    "prefill": {
        "name": "{{ order.full_name }}",
        "contact": "{{ order.phone }}"
    },
    "theme": {
        "color": "#0d6efd"
    }
};
var rzp1 = new Razorpay(options);
rzp1.on('payment.failed', function (response){
        alert("Payment Failed! Reason: " + response.error.description);
});
document.getElementById('rzp-button1').onclick = function(e){
    rzp1.open();
    e.preventDefault();
}
// Automatically open the payment modal
window.onload = function() {
    document.getElementById('rzp-button1').click();
};
</script>
{% endblock %}
